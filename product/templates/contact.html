{% extends 'base.html' %}

{% block content %}

    <style>
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #212529;
            }
            .card {
                background-color: #343a40;
                border-color: #495057;
            }
            .card h1 {
                color: #e9ecef;
            }
            .card p {
                color: #6c757d;
            }
            .form-label {
                color: #6c757d;
            }
            .form-control {
                background-color: #495057;
                border-color: #6c757d;
                color: white;
            }
            .form-control::placeholder {
                color: #6c757d;
            }
            .form-control:focus {
                background-color: #495057;
                border-color: #6c757d;
                box-shadow: 0 0 0 0.2rem rgba(108, 117, 125, 0.25);
                color: white;
            }
            #result {
                color: #6c757d;
            }
        }

        .min-vh-100 {
            min-height: 100vh;
        }
    </style>

    <div id="contact-page" class="d-flex align-items-center bg-light">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xl-6 col-lg-8 col-md-10">
                    <div class="card shadow-sm my-5">
                        <div class="card-body p-4">
                            <div class="text-center mb-4">
                                <h1 class="h2 fw-semibold text-secondary mb-3">Contact Us</h1>
                                <p class="text-muted">Fill up the form below to send us a message.</p>
                            </div>

                            <form action="https://api.web3forms.com/submit" method="POST" id="form">
                                <input type="hidden" name="access_key" value="bed58ce9-0e6d-4fa1-9f14-7a8a68d28113" />
                                <input type="hidden" name="subject" value="New Submission from Apple India"/>
                                <input type="checkbox" name="botcheck" id="" style="display: none;" />

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="first_name" class="form-label">First Name</label>
                                        <input
                                            type="text"
                                            name="name"
                                            id="first_name"
                                            placeholder="John"
                                            required
                                            class="form-control"
                                        />
                                    </div>
                                    <div class="col-md-6">
                                        <label for="lname" class="form-label">Last Name</label>
                                        <input
                                            type="text"
                                            name="last_name"
                                            id="lname"
                                            placeholder="Doe"
                                            required
                                            class="form-control"
                                        />
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="email" class="form-label">Email Address</label>
                                        <input
                                            type="email"
                                            name="email"
                                            id="email"
                                            placeholder="you@company.com"
                                            required
                                            class="form-control"
                                        />
                                    </div>
                                    <div class="col-md-6">
                                        <label for="phone" class="form-label">Phone Number</label>
                                        <input
                                            type="text"
                                            name="phone"
                                            id="phone"
                                            placeholder="+1 (555) 1234-567"
                                            required
                                            class="form-control"
                                        />
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="message" class="form-label">Your Message</label>
                                    <textarea
                                        rows="5"
                                        name="message"
                                        id="message"
                                        placeholder="Your Message"
                                        class="form-control"
                                        required
                                    ></textarea>
                                </div>

                                <div class="mb-3">
                                    <button
                                        type="submit"
                                        class="btn btn-primary w-100 py-3"
                                    >
                                        Send Message
                                    </button>
                                </div>

                                <p class="text-center text-muted" id="result"></p>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
const form = document.getElementById("form");
const result = document.getElementById("result");

form.addEventListener("submit", function (e) {
  e.preventDefault();

  const formData = new FormData(form);
  const object = Object.fromEntries(formData);
  const json = JSON.stringify(object);

  result.innerHTML = "Please wait...";

  fetch("https://api.web3forms.com/submit", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Accept: "application/json",
    },
    body: json,
  })
    .then(async (response) => {
      let json = await response.json();
      if (response.status == 200) {
        result.innerHTML = json.message;
        result.classList.remove("text-gray-500");
        result.classList.add("text-green-500");
      } else {
        console.log(response);
        result.innerHTML = json.message;
        result.classList.remove("text-gray-500");
        result.classList.add("text-red-500");
      }
    })
    .catch((error) => {
      console.log(error);
      result.innerHTML = "Something went wrong!";
    })
    .then(function () {
      form.reset();
      setTimeout(() => {
        result.style.display = "none";
      }, 5000);
    });
});
</script>
{% endblock %}
